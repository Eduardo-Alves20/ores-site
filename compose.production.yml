services:
  db:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ores_db}
      MYSQL_USER: ${MYSQL_USER:-ores_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

  backend:
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      DB_NAME: ${MYSQL_DATABASE:-ores_db}
      DB_USER: ${MYSQL_USER:-ores_user}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://oresong.com}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-oresong.com}
      COOKIE_SECURE: "true"
      ADMIN_EMERGENCY_LOGIN: "false"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.production
    ports: !override
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      VITE_BACKEND_PROXY: http://backend:3001
