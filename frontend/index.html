<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Primary SEO ─────────────────────────────────────────────────── -->
    <title>ORES - ONG Organização de Reintegração e Estímulo Social</title>

    <meta name="keywords" content="ORES, ONG ORES, Organização de Reintegração e Estímulo Social, ONG Brasil, ONG Rio de Janeiro, acolhimento social, reintegração social, doação, voluntariado, ações sociais, banho da cidadania, cuidado social" />
    <meta name="author" content="ORES" />

    <meta name="twitter:title" content="ORES - ONG Organização de Reintegração e Estímulo Social" />
    <meta name="twitter:description" content="ONG brasileira que promove acolhimento, inclusão e reintegração social." />
    <meta name="twitter:image" content="https://oresong.com/og-cover.jpg" />

    <!-- ─── Theme & icons ──────────────────────────────────────────── -->
    <meta name="theme-color" content="#0d2d5e" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ─── Structured data: tells Google "this is an NGO called ORES" ─ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NGO",
      "name": "ORES",
      "alternateName": [
        "ORES ONG",
        "ONG ORES",
        "Organização de Reintegração e Estímulo Social",
        "OresOng"
      ],
      "url": "https://oresong.com",
      "logo": "https://oresong.com/favicon.svg",
      "image": "https://oresong.com/og-cover.jpg",
      "description": "ONG brasileira que promove acolhimento, inclusão e reintegração social de pessoas em situação de vulnerabilidade.",
      "foundingLocation": {
        "@type": "Place",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "BR",
          "addressRegion": "RJ"
        }
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Rio de Janeiro",
        "addressRegion": "RJ",
        "addressCountry": "BR",
        "streetAddress": "Rua Beni, 78 - Praia da Bandeira"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Brasil"
      },
      "knowsLanguage": ["pt-BR", "en"],
      "sameAs": []
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ORES",
      "alternateName": "ORES ONG",
      "url": "https://oresong.com",
      "inLanguage": "pt-BR",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://oresong.com/noticias?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <noscript>
      <h1>ORES - Organização de Reintegração e Estímulo Social</h1>

    <script type="module" src="/src/main.jsx"></script>
